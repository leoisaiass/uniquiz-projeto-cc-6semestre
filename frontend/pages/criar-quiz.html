<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>UniQuiz - Criar Quiz</title>

  <link rel="icon" type="image/png" href="assets/logo.png">

  <link rel="stylesheet" href="../css/main.css">
</head>

<body class="bg-criar-quiz">

  <!-- ===================================== -->
  <!-- NAVBAR -->
  <!-- ===================================== -->

  <header class="navbar">

    <div class="logo">
      <a href="index.html" class="logo-link">
        <img src="assets/logo.png" alt="Logo UniQuiz" class="logo-img">
        <span class="logo-text">UniQuiz</span>
      </a>
    </div>

    <nav>
      <ul class="nav-links">

        <li>
          <a href="quizzes.html">Quizzes</a>
        </li>

        <li class="nav-usuario" id="usuarioLogado"></li>

        <li>
          <a href="#" onclick="logout()">Sair</a>
        </li>

      </ul>
    </nav>

  </header>

  <!-- ===================================== -->
  <!-- CONTEÚDO -->
  <!-- ===================================== -->

  <main class="container-criar-quiz">

    <section class="painel-criar-quiz">

      <h1 class="titulo-criar-quiz">
        Criar Novo Quiz
      </h1>

      <form id="formCriarQuiz" class="card-criar-quiz">

        <!-- TEMA -->
        <div class="campo-grande">
          <label for="tema">Tema do Quiz</label>
          <select id="tema" required>
            <option value="">Carregando temas...</option>
          </select>
        </div>

        <!-- TÍTULO -->
        <div class="campo-grande">
          <label for="titulo">Título do Quiz</label>
          <input type="text" id="titulo" placeholder="Digite o título do quiz" required>
        </div>

        <!-- DESCRIÇÃO -->
        <div class="campo-textarea">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" placeholder="Descreva o conteúdo do quiz" required></textarea>
        </div>

        <!-- DIFICULDADE -->
        <div class="campo-grande">
          <label for="dificuldade">Dificuldade</label>
          <select id="dificuldade" required>
            <option value="">Selecione</option>
            <option value="facil">Fácil</option>
            <option value="medio">Médio</option>
            <option value="intermediario">Intermediário</option>
            <option value="dificil">Difícil</option>
          </select>
        </div>

        <!-- AÇÕES -->
        <div class="acoes-criar-quiz">

          <button type="button" class="btn-secundario-quiz" id="btnCancelar">
            Cancelar
          </button>

          <button type="submit" class="btn-principal-quiz">
            Criar Quiz
          </button>

        </div>

      </form>

    </section>

  </main>

  <!-- ===================================== -->
  <!-- SCRIPTS -->
  <!-- ===================================== -->

  <script src="../js/auth.js"></script>
  <script src="../js/session.js"></script>

  <script src="../js/criarQuiz.js"></script>

  <script>
    protegerPagina();
  </script>

</body>

</html>
