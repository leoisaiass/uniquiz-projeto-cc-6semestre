<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniQuiz - Login</title>

    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="../css/main.css" />
</head>

<body class="bg-cadastro">

    <header class="navbar">
        <div class="logo">
            <a href="index.html" class="logo-link">
                <img src="assets/logo.png" alt="Logo UniQuiz" class="logo-img" />
                <span class="logo-text">UniQuiz</span>
            </a>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#sobre">Sobre</a></li>
                <li><a href="index.html#solucoes">Soluções</a></li>
                <li><a href="#">Ranking</a></li>
            </ul>
        </nav>
    </header>

    <div class="container-central">
        <div class="card-vidro">

            <img src="assets/logo1.png" alt="Logo UniQuiz" class="logo-formulario" />

            <form class="formulario-corpo" id="formLogin">

                <div class="campo">
                    <label>Email</label>
                    <input class="input" type="email" id="email" required />
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input class="input" type="password" id="senha" required />
                </div>

                <button type="submit" class="btn btn-login">
                    Entrar
                </button>

            </form>

            <div class="rodape-card">
                <p>Primeiro acesso?</p>

                <button class="btn btn-signup"
                        onclick="window.location.href='cadastro.html'">
                    Cadastrar-se
                </button>
            </div>

        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>

    <script>
        bloquearPaginaPublica();
    </script>

</body>
</html>
