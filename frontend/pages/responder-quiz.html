<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>UniQuiz • Responder Quiz</title>

    <link
        rel="icon"
        type="image/png"
        href="assets/logo.png"
    />

    <link
        rel="stylesheet"
        href="../css/main.css"
    />

</head>

<body class="bg-quizes">

    <!-- NAVBAR -->

    <header class="navbar">

        <a href="quizzes.html" class="logo-link">

            <img
                src="assets/logo.png"
                alt="Logo UniQuiz"
                class="logo-img"
            />

            <span class="logo-text">
                UniQuiz
            </span>

        </a>

        <nav>

            <ul class="nav-links">

                <li>
                    <a href="quizzes.html">
                        Quizzes
                    </a>
                </li>

                <li class="nav-usuario" id="usuarioLogado"></li>

                <li>
                    <a href="#" onclick="logout()">
                        Sair
                    </a>
                </li>

            </ul>

        </nav>

    </header>

    <!-- CONTEÚDO -->

    <main class="container-quizzes">

        <div class="card-painel">

            <!-- TOPO -->

            <section class="hero-quizzes hero-responder">

                <div class="hero-conteudo">

                    <span class="badge-topo">
                        Respondendo Quiz
                    </span>

                    <h1 id="tituloQuiz">
                        Carregando quiz...
                    </h1>

                    <p>
                        Leia com atenção e escolha
                        a alternativa correta.
                    </p>

                </div>

                <div class="quiz-status">

                    <div class="status-box">

                        <span>Pontuação</span>

                        <strong id="pontuacao">
                            0
                        </strong>

                    </div>

                    <div class="status-box timer-box">

                        <span>Tempo</span>

                        <strong id="contador">
                            --
                        </strong>

                    </div>

                </div>

            </section>

            <!-- CARD PERGUNTA -->

            <section class="card-pergunta-principal">

                <div class="pergunta-topo">

                    <span id="numeroPergunta">
                        Pergunta 1
                    </span>

                </div>

                <div class="texto-pergunta">

                    <h2 id="textoPergunta">
                        Carregando pergunta...
                    </h2>

                </div>

                <!-- ALTERNATIVAS -->

                <div
                    class="alternativas-resposta"
                    id="alternativasContainer"
                ></div>

                <!-- AÇÕES -->

                <div class="botoes-navegacao-quiz">

                    <button
                        class="btn-voltar-pergunta"
                        onclick="window.history.back()"
                    >
                        Voltar
                    </button>

                    <button
                        class="btn-finalizar-quiz"
                        id="btnProxima"
                        disabled
                    >
                        Próxima
                    </button>

                </div>

            </section>

        </div>

    </main>

    <!-- SCRIPTS -->

    <script src="../js/auth.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/responderQuiz.js"></script>

    <script>

        protegerPagina();
        mostrarUsuarioLogado();

    </script>

</body>

</html>
