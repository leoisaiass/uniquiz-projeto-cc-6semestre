<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniQuiz - Cadastro</title>

    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="bg-cadastro">

    <header class="navbar">
        <div class="logo">
            <a href="index.html" class="logo-link">
                <img src="assets/logo.png" alt="Logo UniQuiz" class="logo-img">
                <span class="logo-text">UniQuiz</span>
            </a>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#sobre">Sobre</a></li>
                <li><a href="index.html#solucoes">Soluções</a></li>
                <li><a href="dashboard.html">Ranking</a></li>
            </ul>
        </nav>
    </header>

    <div class="container-central">
        <div class="card-vidro">

            <img src="assets/logo1.png" alt="Logo UniQuiz" class="logo-formulario">

            <form class="formulario-corpo" id="formCadastro">

                <div class="campo">
                    <label>Nome do usuário</label>
                    <input class="input" type="text" id="username" required>
                </div>

                <div class="campo">
                    <label>Nome completo</label>
                    <input class="input" type="text" id="nomeCompleto" required>
                </div>

                <div class="campo">
                    <label>Email</label>
                    <input class="input" type="email" id="email" required>
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input class="input" type="password" id="senha" required>
                </div>

                <div class="campo">
                    <label>Confirmar senha</label>
                    <input class="input" type="password" id="confirmarSenha" required>
                </div>

                <button type="submit" class="btn btn-signup">
                    Cadastrar
                </button>

            </form>

            <div class="rodape-card">
                <p>Já tem conta?</p>

                <button class="btn btn-login"
                        onclick="window.location.href='login.html'">
                    Entrar
                </button>
            </div>

        </div>
    </div>

    <script src="../js/cadastro.js"></script>
    <script src="../js/auth.js"></script>

    <script>
        bloquearPaginaPublica();
    </script>

</body>
</html>
