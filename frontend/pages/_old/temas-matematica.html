<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniQuiz - Temas de Matemática</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-quizes">

    <header class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
                <img src="assets/logo.png" alt="Logo UniQuiz" class="logo-img">
                <span class="logo-text">UniQuiz</span>
            </a>
        </div>
        <nav>
            <ul class="nav-links">

            </div>

                        <p class="seletor-texto">Selecione a Dificuldade</p>
                        <div class="botoes-dificuldade">
                            <button class="btn-dif" onclick="window.location.href='responder-quiz.html'">Fácil</button>
                            <button class="btn-dif" onclick="window.location.href='responder-quiz.html'">Médio</button>
                            <button class="btn-dif"
                                onclick="window.location.href='responder-quiz.html'">Intermediário</button>
                            <button class="btn-dif"
                                onclick="window.location.href='responder-quiz.html'">Difícil</button>

                </div>

                        <p class="seletor-texto">Selecione a Dificuldade</p>

                            <button class="btn-dif" onclick="window.location.href='responder-quiz.html'">Fácil</button>
                            <button class="btn-dif" onclick="window.location.href='responder-quiz.html'">Médio</button>
                            <button class="btn-dif"

            <div class="rodape-temas">
